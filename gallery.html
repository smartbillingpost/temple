<style>
body{font-family:'Inter',sans-serif}
.heading{font-family:'Playfair Display',serif}
</style>

</head>

<body class="bg-cream text-gray-800">

<!-- NAVBAR -->
<nav class="bg-white/80 backdrop-blur shadow fixed w-full z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="heading text-primary font-bold">Annapurna Kashi Temple</h1>

<div class="hidden md:flex gap-6 font-medium">
<a href="index.html">Home</a>

<div id="mobileMenu" class="hidden md:hidden bg-white px-6 pb-4">

<a href="about.html" class="block py-2">About</a>
<a href="seva.html" class="block py-2">Seva</a>
<a href="gallery.html" class="block py-2">Gallery</a>
<a href="management.html" class="block py-2">Management</a>
<a href="contact.html" class="block py-2">Contact</a>
</div>

</nav>

<!-- HERO -->
<section class="pt-32 pb-10 text-center">

<h2 class="heading text-4xl text-primary">Temple Gallery</h2>
<p class="text-gray-600">Sacred moments and temple celebrations</p>

</section>

<!-- DROPDOWNS -->
<section class="max-w-5xl mx-auto px-6 mb-10">

<div class="grid md:grid-cols-3 gap-6">

<!-- EVENT -->
<div>
<label class="font-semibold">Select Event</label>

<select id="eventSelect" class="w-full border p-3 rounded mt-1">
<option value="">Select Event</option>
<option value="masa">Masa Sivaratri</option>
<option value="maha">Maha Sivaratri</option>
<option value="kalyanam">Swamy Vari Kalyanam</option>
<option value="kumkuma">Kumkuma Pooja</option>
<option value="rahu">Rahu Kethu Pooja</option>
</select>

</div>

<!-- YEAR -->
<div id="yearBox" class="hidden">
<label class="font-semibold">Select Year</label>

<select id="yearSelect" class="w-full border p-3 rounded mt-1">
<option value="">Select Year</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>
</select>

</div>

<!-- MONTH -->
<div id="monthBox" class="hidden">
<label class="font-semibold">Select Month</label>

<select id="monthSelect" class="w-full border p-3 rounded mt-1">
<option value="">Select Month</option>
<option value="jan">January</option>
<option value="feb">February</option>
<option value="mar">March</option>
<option value="apr">April</option>
<option value="may">May</option>
<option value="jun">June</option>
<option value="jul">July</option>
<option value="aug">August</option>
<option value="sep">September</option>
<option value="oct">October</option>
<option value="nov">November</option>
<option value="dec">December</option>
</select>

</div>

</div>

</section>

<!-- GALLERY -->
<section class="pb-20">

<div class="max-w-7xl mx-auto px-6">

<div id="gallery" class="grid md:grid-cols-3 gap-6"></div>

</div>

</section>

<script>

const eventSelect=document.getElementById("eventSelect")
const yearBox=document.getElementById("yearBox")
const monthBox=document.getElementById("monthBox")

const yearSelect=document.getElementById("yearSelect")
const monthSelect=document.getElementById("monthSelect")

const gallery=document.getElementById("gallery")

function loadImages(path){

gallery.innerHTML=""

for(let i=1;i<=12;i++){

gallery.innerHTML+=`
<img src="${path}/${i}.jpg"
class="rounded-xl shadow hover:scale-105 transition">
`

}

}

eventSelect.addEventListener("change",function(){

monthBox.classList.add("hidden")
yearBox.classList.add("hidden")

if(this.value==="masa"){
yearBox.classList.remove("hidden")
monthBox.classList.remove("hidden")
}

else if(this.value==="maha"){
yearBox.classList.remove("hidden")
}

else{

let path=`images/other-sevas/${this.value}`
loadImages(path)

}

})

yearSelect.addEventListener("change",function(){

if(eventSelect.value==="maha"){

let path=`images/maha-sivaratri/${this.value}`
loadImages(path)

}

})

monthSelect.addEventListener("change",function(){

let year=yearSelect.value
let month=this.value

let path=`images/masa-sivaratri/${year}/${month}`

loadImages(path)

})

</script>

<script>
const btn=document.getElementById("menuBtn")
const menu=document.getElementById("mobileMenu")

btn.addEventListener("click",()=>{
menu.classList.toggle("hidden")
})
</script>

</body>
</html>
